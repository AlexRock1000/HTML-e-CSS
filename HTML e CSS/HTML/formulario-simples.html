<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
</head>
<body>
    <h1>Fale Conosco</h1>
    <p>Utilize o formulário para entrar em contato conosco!</p>
    <hr>
    <form action="">
        <label for="primeiro nome">Primeiro nome:</label><br>
        <input type="text" name="primeiro nome" id="primeiro nome"><br>
        <label for="sobrenome">Sobrenome:</label><br>
        <input type="text" name="sobrenome" id="sobrenome"><br>
        <label for="telefone">Telefeno</label><br>
        <input type="tel" name="telefone" id="telefone"><br>
        <label for="email">E-mail</label><br>
        <input type="email" name="email" id="email"><br>
        <p>Selecione os cursos que mais te intererssam</p>
        <input type="checkbox" name="html" id="html">
        <label for="html">HTML</label><br>
        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label><br>
        <input type="checkbox" name="javascript" id="javascript">
        <label for="javascript">JavaScript</label>
        <p>Seleciopne a sua faixa etária:</p>
        <input type="radio" name="faixa-idade" id="faixa-01" value="12-20">
        <label for="faixa-01">12 a 20 anos</label><br>
        <input type="radio" name="faixa-idade" id="faixa-02" value="21-30">
        <label for="faixa-02">21 a 30 anos</label><br>
        <input type="radio" name="faixa-idade" id="faixa-03" value="31+">
        <label for="faixa-03">31 ou mais</label><br>
        <p>Selecione o período de preferência para o seu curso:</p>
        <select name="horario" id="horario">
            <option value="manhã">Manhã</option>
            <option value="tarde">Tarde</option>
            <option value="noite">Noite</option>
        </select><br><br>
        <input type="submit" value="Enviar formulário">
    </form>
</body>
</html>
