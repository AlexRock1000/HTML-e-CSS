<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pousada Paradiso</title>
</head>
<body>
    <img src="imagens/logotipo.png" alt="Logotipo da Pousada Paradiso">
    <h1>Pousada Paradiso</h1>
    <p>Conheça nossos chalés e nosso quarto comunitário, faça sua reserva e aproveite sua estadia!</p>
<h2>Formulário para reservas</h2>
<p>Preencha o formulário abaixo e entraremos em contanto para dar andamento com sua reserva</p>
<form action="">
        <label for="nome">Nome</label><br>
        <input type="text" name="nomecompleto" id="nome" placeholder="Seu nome completo"><br>
        <label for="telefeno">Telefeno</label><br>
        <input type="text" name="telefeno" id="telefeno" placeholder="Seu telefeno"><br>
        <label for="email">E-mail</label><br>
        <input type="email" name="email" id="email" placeholder="Seu e-mail">
        <p>Hospedagem</p>
        <select name="Hospedagem" id="Hospedegam">
        <option value="Chalé Plus">Chalé Plus</option>
        <option value="chale master">Chalé Master</option>
        <option value="quarto">Quarto</option>
        </select><br><br>
        <label for="entrada">Entarda</label><br>
        <input type="text" name="data-entrada" id="data-entrada" placeholder="DD/MM/AAAA"><br><br>
        <label for="saida">Saída</label><br>
        <input type="text" name="data-saida" id="data-saida" placeholder="DD/MM/AAAA"><br><br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
