<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBOX</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .caixa-1{
            width: 400px;
            height: 140px;
            padding: 20px;
            border: 10px solid blueviolet;
        }
        .caixa-2{
            width: 400px;
            height: 80px;
            padding: 20px;
            border: 10px solid crimson;
        }
        p{
            width: 400px;
            height: 120px;
            padding: 20px;
            border: 10px solid springgreen;
        }
    </style>
</head>
<body>
    <h1 class="caixa-1">H1 parta cabeçalho do site</h1>
    <h2 class="caixa-2">H2 para subcabeçalho do site</h2>
    <p>
        P para a criaçãode um parágrafo de medelo, queremos que o texto coupe um espaço legal para a visualização da caixa produzida pelo elemento.
    </p>
    <p>
        Segundo P para a criação de um novo parágrafo, novamente para a visualizar da caixa de elemento.
    </p>
</body>
</html>
